name: genz_dictionary
description: Gen Z Dictionary MVP - offline-first, neon visuals, shareable cards
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State / nav
  flutter_riverpod: ^2.6.1
  go_router: ^16.3.0

  # Utils
  http: ^1.6.0
  #google_fonts: ^6.2.1
  intl: ^0.20.2

  # Share card
  screenshot: ^3.0.0
  share_plus: ^11.1.0

  # Animations (optional)
  lottie: ^3.1.2

  # Icons
  cupertino_icons: ^1.0.8
  confetti: ^0.8.0
  qr_flutter: ^4.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  uuid: ^4.5.3
  shared_preferences: ^2.5.4
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  firebase_analytics: ^12.1.3
  
  





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/slang_local.json
    - assets/lottie/loading.json
